name: Build Scriptura

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.10.2"
          host: linux
          target: desktop
      - name: Install dependencies
        run: sudo apt-get install -y cmake g++ linuxdeployqt
      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
      - name: Build and Deploy
        run: |
          cmake --build build --config Release
          chmod +x deploy-linux.sh
          ./deploy-linux.sh
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: scriptura-linux
          path: deploy/*
          retention-days: 14

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: "6.10.2"
          host: mac
          target: desktop
      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
      - name: Build and Deploy
        run: |
          cmake --build build --config Release
          chmod +x deploy-macos.sh
          ./deploy-macos.sh
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: scriptura-macos
          path: deploy/*
          retention-days: 14

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.2"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
      - name: Configure (MSVC)
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -A x64 -DCMAKE_INSTALL_PREFIX=build/install
      - name: Build and Deploy
        run: |
          cmake --build build --config Release
          deploy-windows.bat
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: scriptura-windows
          path: deploy/*
          retention-days: 14
