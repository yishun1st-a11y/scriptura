name: Build Scriptura

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.2"
          host: linux
          target: desktop
      - name: Install dependencies
        run: sudo apt-get install -y cmake g++
      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
      - name: Build and Deploy
        run: |
          cmake --build build --config Release
          chmod +x deploy-linux.sh
          ./deploy-linux.sh
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: scriptura-linux
          path: deploy/*
          retention-days: 14

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.2"
          host: mac
          target: desktop
      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
      - name: Build and Deploy
        run: |
          cmake --build build --config Release
          chmod +x deploy-macos.sh
          ./deploy-macos.sh
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: scriptura-macos
          path: deploy/*
          retention-days: 14

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.2"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
      - name: Configure (MSVC)
        run: cmake -B build -S . -A x64 -DCMAKE_INSTALL_PREFIX=build/install
      - name: Build
        run: cmake --build build --config Release
      - name: Add Qt to PATH
        shell: powershell
        run: |
          # Find Qt installation and add to PATH
          $qtBin = Get-ChildItem -Path "C:\Qt" -Filter "windeployqt.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($qtBin) {
            $binDir = $qtBin.DirectoryName
            Write-Host "Adding Qt bin to PATH: $binDir"
            $env:Path = "$binDir;$env:Path"
            Add-Content -Path $env:GITHUB_ENV -Value "QT_BIN_DIR=$binDir" -Encoding utf8
          } else {
            Write-Host "Qt bin directory not found, checking environment..."
            # Check if Qt6_DIR is set
            if ($env:Qt6_DIR) {
              $binDir = Join-Path (Split-Path $env:Qt6_DIR -Parent) "bin"
              Write-Host "Using Qt6_DIR: $binDir"
              $env:Path = "$binDir;$env:Path"
              Add-Content -Path $env:GITHUB_ENV -Value "QT_BIN_DIR=$binDir" -Encoding utf8
            }
          }
      - name: Debug Qt environment
        shell: powershell
        run: |
          Write-Host "PATH: $env:Path"
          Write-Host "QT_BIN_DIR: $env:QT_BIN_DIR"
          Write-Host "Qt6_DIR: $env:Qt6_DIR"
          Get-Command windeployqt -ErrorAction SilentlyContinue
      - name: Deploy
        shell: cmd
        run: deploy-windows.bat
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: scriptura-windows
          path: deploy/*
          retention-days: 14
