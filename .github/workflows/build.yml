name: Build Scriptura

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ qt6-base-dev qt6-tools-dev
      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release -j$(nproc)
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: scriptura-linux
          path: build/scriptura
          retention-days: 14

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        run: brew install qt
      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=/opt/homebrew/opt/qt
      - name: Build
        run: cmake --build build --config Release -j$(sysctl -n hw.ncpu)
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: scriptura-macos
          path: build/scriptura.app
          retention-days: 14

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          setup-python: 'true'
      - name: Configure (MSVC)
        run: cmake -B build -S . -A x64 -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release -j
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: scriptura-windows
          path: build/scriptura.exe
          retention-days: 14
